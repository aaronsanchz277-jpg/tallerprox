<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>TallerPro</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --success: #00ff88;
    --warning: #ffcc00;
    --danger: #ff4444;
    --text: #e8e8f0;
    --text2: #8888aa;
    --font-head: 'Rajdhani', sans-serif;
    --font-body: 'Inter', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--font-body); min-height:100vh; overflow-x:hidden; }

  /* SPLASH */
  #splash { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; transition:opacity .5s; }
  #splash .logo-big { font-family:var(--font-head); font-size:3rem; font-weight:700; color:var(--accent); letter-spacing:4px; }
  #splash .sub { color:var(--text2); font-size:.85rem; margin-top:.5rem; letter-spacing:2px; }
  #splash .loader { width:60px; height:3px; background:var(--border); border-radius:2px; margin-top:2rem; overflow:hidden; }
  #splash .loader-bar { height:100%; background:var(--accent); border-radius:2px; animation:load 1.5s ease forwards; }
  @keyframes load { from{width:0} to{width:100%} }

  /* LOGIN */
  #login-screen { display:none; min-height:100vh; align-items:center; justify-content:center; padding:1.5rem; flex-direction:column; }
  .login-box { width:100%; max-width:380px; }
  .login-logo { font-family:var(--font-head); font-size:2.5rem; font-weight:700; color:var(--accent); letter-spacing:4px; text-align:center; margin-bottom:.25rem; }
  .login-sub { text-align:center; color:var(--text2); font-size:.8rem; letter-spacing:2px; margin-bottom:2rem; }
  .login-tabs { display:flex; background:var(--surface2); border-radius:10px; padding:4px; margin-bottom:1.5rem; }
  .login-tab { flex:1; padding:.5rem; text-align:center; border:none; background:none; color:var(--text2); cursor:pointer; border-radius:8px; font-family:var(--font-body); font-size:.85rem; transition:all .2s; }
  .login-tab.active { background:var(--accent); color:#000; font-weight:600; }

  /* LAYOUT */
  #app { display:none; flex-direction:column; min-height:100vh; }
  .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 1rem; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .topbar-logo { font-family:var(--font-head); font-size:1.4rem; font-weight:700; color:var(--accent); letter-spacing:2px; }
  .topbar-right { display:flex; align-items:center; gap:.5rem; }
  .topbar-title { font-family:var(--font-head); font-size:1rem; color:var(--text2); }
  .topbar-role { font-size:.65rem; padding:2px 8px; border-radius:20px; font-weight:600; }
  .role-admin { background:rgba(0,229,255,.15); color:var(--accent); border:1px solid rgba(0,229,255,.3); }
  .role-empleado { background:rgba(255,107,53,.15); color:var(--accent2); border:1px solid rgba(255,107,53,.3); }
  .role-cliente { background:rgba(0,255,136,.15); color:var(--success); border:1px solid rgba(0,255,136,.3); }
  .logout-btn { background:none; border:none; color:var(--text2); cursor:pointer; font-size:.75rem; padding:.3rem .6rem; border-radius:6px; border:1px solid var(--border); }

  .content { flex:1; padding:1rem; padding-bottom:80px; max-width:600px; margin:0 auto; width:100%; }

  /* BOTTOM NAV */
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); display:flex; justify-content:flex-start; padding:.5rem 0; z-index:100; overflow-x:auto; scrollbar-width:none; }
  .bottom-nav::-webkit-scrollbar { display:none; }
  .nav-btn { display:flex; flex-direction:column; align-items:center; gap:2px; padding:.4rem .75rem; border:none; background:none; color:var(--text2); cursor:pointer; font-family:var(--font-body); font-size:.62rem; transition:color .2s; border-radius:8px; flex-shrink:0; min-width:64px; }
  .nav-btn svg { width:22px; height:22px; }
  .nav-btn.active { color:var(--accent); }
  .nav-btn.active svg { filter:drop-shadow(0 0 4px var(--accent)); }

  /* CARDS */
  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem; margin-bottom:.75rem; cursor:pointer; transition:border-color .2s, transform .1s; }
  .card:hover { border-color:var(--accent); }
  .card:active { transform:scale(.98); }
  .card-header { display:flex; align-items:center; gap:.75rem; }
  .card-avatar { width:44px; height:44px; border-radius:10px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-size:1.2rem; font-weight:700; color:var(--accent); border:1px solid var(--border); flex-shrink:0; overflow:hidden; }
  .card-info { flex:1; min-width:0; }
  .card-name { font-family:var(--font-head); font-size:1.05rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-sub { font-size:.75rem; color:var(--text2); margin-top:2px; }
  .card-badge { font-size:.7rem; padding:3px 8px; border-radius:20px; font-weight:600; flex-shrink:0; }
  .badge-green { background:rgba(0,255,136,.15); color:var(--success); border:1px solid rgba(0,255,136,.3); }
  .badge-orange { background:rgba(255,107,53,.15); color:var(--accent2); border:1px solid rgba(255,107,53,.3); }
  .badge-yellow { background:rgba(255,204,0,.15); color:var(--warning); border:1px solid rgba(255,204,0,.3); }
  .badge-red { background:rgba(255,68,68,.15); color:var(--danger); border:1px solid rgba(255,68,68,.3); }
  .badge-blue { background:rgba(0,229,255,.15); color:var(--accent); border:1px solid rgba(0,229,255,.3); }

  /* SECTION HEADER */
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
  .section-title { font-family:var(--font-head); font-size:1.5rem; font-weight:700; color:var(--text); }
  .btn-add { background:var(--accent); color:#000; border:none; border-radius:8px; padding:.5rem 1rem; font-family:var(--font-head); font-size:.9rem; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:.4rem; letter-spacing:1px; transition:opacity .2s; }
  .btn-add:hover { opacity:.85; }

  /* SEARCH */
  .search-box { position:relative; margin-bottom:1rem; }
  .search-box input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.6rem 1rem .6rem 2.5rem; color:var(--text); font-family:var(--font-body); font-size:.9rem; outline:none; transition:border-color .2s; }
  .search-box input:focus { border-color:var(--accent); }
  .search-box svg { position:absolute; left:.75rem; top:50%; transform:translateY(-50%); color:var(--text2); width:16px; height:16px; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200; display:flex; align-items:flex-end; justify-content:center; backdrop-filter:blur(4px); }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:20px 20px 0 0; padding:1.5rem; width:100%; max-width:600px; max-height:90vh; overflow-y:auto; animation:slideUp .3s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-title { font-family:var(--font-head); font-size:1.3rem; font-weight:700; color:var(--accent); margin-bottom:1.25rem; }
  .form-group { margin-bottom:1rem; }
  .form-label { font-size:.75rem; color:var(--text2); margin-bottom:.4rem; display:block; letter-spacing:.5px; text-transform:uppercase; }
  .form-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:.65rem .9rem; color:var(--text); font-family:var(--font-body); font-size:.9rem; outline:none; transition:border-color .2s; }
  .form-input:focus { border-color:var(--accent); }
  select.form-input { cursor:pointer; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
  .btn-primary { width:100%; background:var(--accent); color:#000; border:none; border-radius:10px; padding:.75rem; font-family:var(--font-head); font-size:1rem; font-weight:700; cursor:pointer; letter-spacing:1px; margin-top:.5rem; transition:opacity .2s; }
  .btn-primary:hover { opacity:.85; }
  .btn-secondary { width:100%; background:transparent; color:var(--text2); border:1px solid var(--border); border-radius:10px; padding:.7rem; font-family:var(--font-head); font-size:.95rem; cursor:pointer; letter-spacing:1px; margin-top:.5rem; transition:border-color .2s; }
  .btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
  .btn-danger { width:100%; background:rgba(255,68,68,.15); color:var(--danger); border:1px solid rgba(255,68,68,.3); border-radius:10px; padding:.7rem; font-family:var(--font-head); font-size:.95rem; cursor:pointer; letter-spacing:1px; margin-top:.5rem; transition:background .2s; }
  .btn-danger:hover { background:rgba(255,68,68,.25); }

  /* DETAIL */
  .detail-header { display:flex; align-items:center; gap:.75rem; margin-bottom:1.25rem; }
  .back-btn { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:.4rem .7rem; color:var(--text2); cursor:pointer; display:flex; align-items:center; gap:.3rem; font-size:.85rem; }
  .detail-avatar { width:56px; height:56px; border-radius:12px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-size:1.6rem; font-weight:700; color:var(--accent); border:2px solid var(--accent); flex-shrink:0; }
  .detail-name { font-family:var(--font-head); font-size:1.4rem; font-weight:700; }
  .detail-sub { font-size:.8rem; color:var(--text2); }
  .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:.6rem; margin-bottom:1rem; }
  .info-item { background:var(--surface2); border-radius:8px; padding:.6rem .8rem; border:1px solid var(--border); }
  .info-item .label { font-size:.65rem; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }
  .info-item .value { font-size:.9rem; color:var(--text); margin-top:2px; font-weight:500; }
  .sub-section { margin-top:1.25rem; }
  .sub-section-title { font-family:var(--font-head); font-size:1rem; color:var(--text2); margin-bottom:.6rem; letter-spacing:1px; border-bottom:1px solid var(--border); padding-bottom:.4rem; }

  /* STATS */
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-bottom:1.25rem; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem; text-align:center; }
  .stat-value { font-family:var(--font-head); font-size:1.8rem; font-weight:700; color:var(--accent); }
  .stat-label { font-size:.72rem; color:var(--text2); margin-top:4px; }

  /* TABS */
  .tabs { display:flex; gap:.5rem; margin-bottom:1rem; overflow-x:auto; padding-bottom:.25rem; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { padding:.4rem .9rem; border-radius:20px; border:1px solid var(--border); background:none; color:var(--text2); font-size:.8rem; cursor:pointer; white-space:nowrap; transition:all .2s; font-family:var(--font-body); }
  .tab.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; }

  /* INVENTARIO */
  .inv-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.85rem; margin-bottom:.6rem; display:flex; align-items:center; gap:.75rem; cursor:pointer; }
  .inv-icon { width:40px; height:40px; background:var(--surface2); border-radius:8px; display:flex; align-items:center; justify-content:center; border:1px solid var(--border); flex-shrink:0; }
  .inv-info { flex:1; min-width:0; }
  .inv-name { font-weight:500; font-size:.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .inv-meta { font-size:.75rem; color:var(--text2); margin-top:2px; }
  .inv-stock { text-align:right; flex-shrink:0; }
  .inv-qty { font-family:var(--font-head); font-size:1.3rem; font-weight:700; }
  .inv-unit { font-size:.7rem; color:var(--text2); }
  .stock-low { color:var(--danger); }
  .stock-ok { color:var(--success); }

  /* EMPTY & LOADING */
  .empty { text-align:center; padding:3rem 1rem; color:var(--text2); }
  .empty svg { width:48px; height:48px; margin-bottom:1rem; opacity:.3; }
  .empty p { font-size:.9rem; }
  .loading { text-align:center; padding:2rem; color:var(--text2); font-size:.85rem; }

  /* TOAST */
  #toast { position:fixed; top:1rem; left:50%; transform:translateX(-50%); background:var(--surface2); border:1px solid var(--accent); color:var(--text); padding:.6rem 1.2rem; border-radius:8px; font-size:.85rem; z-index:999; opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap; }
  #toast.show { opacity:1; }

  /* FACTURA */
  .factura-item { display:flex; justify-content:space-between; padding:.5rem 0; border-bottom:1px solid var(--border); font-size:.85rem; }
  .factura-total { display:flex; justify-content:space-between; padding:.75rem 0; font-family:var(--font-head); font-size:1.1rem; color:var(--accent); }
</style>
</head>
<body>

<div id="splash">
  <div class="logo-big">TALLERPRO</div>
  <div class="sub">GESTIÓN INTELIGENTE</div>
  <div class="loader"><div class="loader-bar"></div></div>
</div>

<div id="toast"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">TALLERPRO</div>
    <div class="login-sub">GESTIÓN INTELIGENTE</div>
    <div id="login-form">
      <div class="login-tabs">
        <button class="login-tab active" onclick="switchLoginTab('login')">Ingresar</button>
        <button class="login-tab" id="tab-register" onclick="switchLoginTab('register')">Registrarse</button>
        <button class="login-tab" id="tab-nuevo-taller" onclick="switchLoginTab('nuevo-taller')">Nuevo Taller</button>
      </div>

      <!-- REGISTRO CLIENTE / EMPLEADO -->
      <div id="register-fields" style="display:none">
        <div class="form-group"><label class="form-label">Nombre completo *</label><input class="form-input" id="reg-nombre" placeholder="Tu nombre"></div>
        <div class="form-group">
          <label class="form-label">Código de empleado (opcional)</label>
          <input class="form-input" id="reg-codigo" placeholder="Dejá vacío si sos cliente">
          <div style="font-size:.72rem;color:var(--text2);margin-top:.3rem">Si tenés un código de tu taller, ingresalo para registrarte como empleado.</div>
        </div>
      </div>

      <!-- NUEVO TALLER (ADMIN) -->
      <div id="nuevo-taller-fields" style="display:none">
        <div style="background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.2);border-radius:8px;padding:.75rem;margin-bottom:1rem;font-size:.8rem;color:var(--text2)">
          Registrá tu taller y creá tu cuenta de administrador.
        </div>
        <div class="form-group"><label class="form-label">Tu nombre *</label><input class="form-input" id="reg-nombre-admin" placeholder="Tu nombre completo"></div>
        <div class="form-group"><label class="form-label">Nombre del taller *</label><input class="form-input" id="reg-taller" placeholder="Taller San José"></div>
        <div class="form-group"><label class="form-label">Teléfono del taller</label><input class="form-input" id="reg-tel" placeholder="+595 21 000 000"></div>
      </div>

      <div class="form-group"><label class="form-label">Email *</label><input class="form-input" id="auth-email" type="email" placeholder="tu@email.com"></div>
      <div class="form-group"><label class="form-label">Contraseña *</label><input class="form-input" id="auth-pass" type="password" placeholder="••••••••"></div>
      <button class="btn-primary" id="auth-btn" onclick="handleAuth()">INGRESAR</button>
      <p id="auth-error" style="color:var(--danger);font-size:.8rem;margin-top:.75rem;text-align:center;display:none"></p>
      <div id="forgot-link" style="text-align:center;margin-top:.75rem">
        <button onclick="switchLoginTab('forgot')" style="background:none;border:none;color:var(--text2);font-size:.8rem;cursor:pointer;text-decoration:underline">¿Olvidaste tu contraseña?</button>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">TALLERPRO</div>
    <div class="topbar-right">
      <div class="topbar-title" id="page-title"></div>
      <span class="topbar-role" id="role-badge"></span>
      <button class="logout-btn" onclick="logout()">Salir</button>
    </div>
  </div>
  <div class="content" id="main-content"></div>
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<script>
const SUPABASE_URL = 'https://uggqqmsmxvafeyyinuir.supabase.co';
const SUPABASE_KEY = 'sb_publishable_QYoTP02Bh4tEhV_zkQkFVQ_rWXx0hBu';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let recoveryMode = window.location.hash.includes('type=recovery');
const urlParams = new URLSearchParams(window.location.search);
const tallerIdFromUrl = urlParams.get('taller') || null;

let currentUser = null;
let currentPerfil = null;
let currentPage = 'dashboard';
let loginTab = 'login';
let authHandled = false; // Evita que load y onAuthStateChange se pisen

function hideSplash() {
  const splash = document.getElementById('splash');
  if (splash && splash.style.display !== 'none') {
    splash.style.opacity = '0';
    setTimeout(() => { splash.style.display = 'none'; }, 400);
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    authHandled = true;
    recoveryMode = true;
    hideSplash();
    mostrarFormCambiarPass();

  } else if (event === 'SIGNED_IN' && session) {
    if (recoveryMode) return;
    if (authHandled) return;
    authHandled = true;
    hideSplash();
    await loadPerfil(session.user);

  } else if (event === 'SIGNED_OUT') {
    authHandled = false;
    recoveryMode = false;
    currentUser = null;
    currentPerfil = null;
    hideSplash();
    showLogin();
  }
});

window.addEventListener('load', async () => {
  if (recoveryMode) {
    authHandled = true;
    hideSplash();
    mostrarFormCambiarPass();
    return;
  }
  // Esperar 800ms para que onAuthStateChange tenga chance de disparar primero
  await new Promise(r => setTimeout(r, 800));
  if (authHandled) return; // onAuthStateChange ya lo procesó
  authHandled = true;
  try {
    const { data: { session } } = await sb.auth.getSession();
    hideSplash();
    if (session) {
      await loadPerfil(session.user);
    } else {
      showLogin();
    }
  } catch(e) {
    hideSplash();
    showLogin();
  }
});

function mostrarFormCambiarPass() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-form').innerHTML = `
    <div class="login-logo" style="margin-bottom:1.5rem">TALLERPRO</div>
    <div style="font-family:var(--font-head);font-size:1.1rem;color:var(--accent);margin-bottom:1rem;text-align:center">NUEVA CONTRASEÑA</div>
    <div class="form-group"><label class="form-label">Nueva contraseña *</label><input class="form-input" id="new-pass" type="password" placeholder="Mínimo 6 caracteres"></div>
    <div class="form-group"><label class="form-label">Repetir contraseña *</label><input class="form-input" id="new-pass2" type="password" placeholder="Repetí la contraseña"></div>
    <button class="btn-primary" onclick="cambiarContrasena()">GUARDAR CONTRASEÑA</button>
    <p id="auth-error" style="color:var(--danger);font-size:.8rem;margin-top:.75rem;text-align:center;display:none"></p>`;
}

async function loadPerfil(user) {
  currentUser = user;
  try {
    const { data: perfil, error } = await sb.from('perfiles')
      .select('id, nombre, rol, taller_id, talleres(id, nombre, telefono)')
      .eq('id', user.id)
      .maybeSingle();

    if (error) { showLogin(); return; }

    if (!perfil) {
      // Usuario nuevo sin perfil - crear como cliente sin taller
      const { data: nuevo } = await sb.from('perfiles')
        .insert({ id: user.id, nombre: user.email, rol: 'cliente', taller_id: null })
        .select('id, nombre, rol, taller_id, talleres(id, nombre, telefono)')
        .maybeSingle();
      currentPerfil = nuevo;
      showCodigoPrompt();
      return;
    }

    currentPerfil = perfil;

    // Admin y empleados con taller van directo a la app
    if ((perfil.rol === 'admin' || perfil.rol === 'empleado') && perfil.taller_id) {
      showApp();
      return;
    }

    // Cliente sin taller = mostrar prompt de código
    if (perfil.rol === 'cliente' && !perfil.taller_id) {
      showCodigoPrompt();
      return;
    }

    // Cualquier otro caso = mostrar app
    showApp();

  } catch(e) {
    showLogin();
  }
}

function showCodigoPrompt() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-form').innerHTML = `
    <div class="login-logo" style="margin-bottom:.5rem">TALLERPRO</div>

async function aplicarCodigo() {
  const codigo = document.getElementById('prompt-codigo').value.trim().toUpperCase();

  if (!codigo) {
    // Si viene de link de taller, asignarlo automáticamente
    if (tallerIdFromUrl && currentUser) {
      await sb.from('perfiles').update({ taller_id: tallerIdFromUrl }).eq('id', currentUser.id);
      const { data: perfil } = await sb.from('perfiles').select('id, nombre, rol, taller_id, talleres(id, nombre, telefono)').eq('id', currentUser.id).maybeSingle();
      currentPerfil = perfil;
    }
    showApp();
    return;
  }

  const { data: cod } = await sb.from('codigos_empleado').select('*').eq('codigo', codigo).eq('usado', false).single();
  if (!cod) { 
    document.getElementById('auth-error').textContent = 'Código inválido o ya utilizado';
    document.getElementById('auth-error').style.display = 'block';
    return; 
  }

  // Actualizar perfil a empleado
  await sb.from('perfiles').update({ rol: 'empleado', taller_id: cod.taller_id }).eq('id', currentUser.id);
  await sb.from('codigos_empleado').update({ usado: true, usado_por: currentUser.id }).eq('codigo', codigo);

  // Recargar perfil y entrar directo sin pasar por loadPerfil de nuevo
  const { data: perfil } = await sb.from('perfiles').select('id, nombre, rol, taller_id, talleres(id, nombre, telefono)').eq('id', currentUser.id).maybeSingle();
  currentPerfil = perfil;
  toast('Registrado como empleado', 'success');
  showApp();
}

// ─── AUTH ────────────────────────────────────────────────────────────────────
function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  const tabRegister = document.getElementById('tab-register');
  const tabNuevoTaller = document.getElementById('tab-nuevo-taller');
  if (tallerIdFromUrl) {
    // Link de invitación: mostrar Registrarse, ocultar Nuevo Taller
    if (tabRegister) tabRegister.style.display = 'block';
    if (tabNuevoTaller) tabNuevoTaller.style.display = 'none';
  } else {
    // Link normal: ocultar Registrarse, mostrar Nuevo Taller
    if (tabRegister) tabRegister.style.display = 'none';
    if (tabNuevoTaller) tabNuevoTaller.style.display = 'block';
  }
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  buildNav();
  const rol = currentPerfil?.rol || 'cliente';
  const rolLabel = { admin:'ADMIN', empleado:'EMPLEADO', cliente:'CLIENTE' }[rol] || '';
  const rolClass = { admin:'role-admin', empleado:'role-empleado', cliente:'role-cliente' }[rol] || '';
  document.getElementById('role-badge').textContent = rolLabel;
  document.getElementById('role-badge').className = `topbar-role ${rolClass}`;
  navigate('dashboard');
}

function switchLoginTab(tab) {
  loginTab = tab;
  document.querySelectorAll('.login-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')||(i===2&&tab==='nuevo-taller'));
  });
  document.getElementById('register-fields').style.display = tab==='register' ? 'block' : 'none';
  document.getElementById('nuevo-taller-fields').style.display = tab==='nuevo-taller' ? 'block' : 'none';
  document.getElementById('forgot-link').style.display = tab==='login' ? 'block' : 'none';

  // Modo recuperar contraseña
  const forgotMode = tab === 'forgot';
  document.getElementById('auth-pass').style.display = forgotMode ? 'none' : 'block';
  document.getElementById('auth-pass').previousElementSibling.style.display = forgotMode ? 'none' : 'block';

  if (forgotMode) {
    document.getElementById('auth-btn').textContent = 'ENVIAR LINK';
    document.getElementById('auth-btn').onclick = handleForgotPassword;
    document.getElementById('forgot-link').innerHTML = `<button onclick="switchLoginTab('login')" style="background:none;border:none;color:var(--text2);font-size:.8rem;cursor:pointer;text-decoration:underline">← Volver al login</button>`;
  } else {
    const labels = { login:'INGRESAR', register:'REGISTRARME', 'nuevo-taller':'CREAR TALLER' };
    document.getElementById('auth-btn').textContent = labels[tab] || 'INGRESAR';
    document.getElementById('auth-btn').onclick = handleAuth;
  }
}

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  document.getElementById('auth-error').style.display = 'none';
  if (!email || !pass) { showAuthError('Completá todos los campos'); return; }

  if (loginTab === 'login') {
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) showAuthError('Email o contraseña incorrectos');

  } else if (loginTab === 'nuevo-taller') {
    // Bloquear si viene de link de taller
    if (tallerIdFromUrl) { showAuthError('Este link es solo para clientes o empleados'); return; }
    const nombre = document.getElementById('reg-nombre-admin').value.trim();
    const tallerNombre = document.getElementById('reg-taller').value.trim();
    const tallerTel = document.getElementById('reg-tel').value.trim();
    if (!nombre || !tallerNombre) { showAuthError('Completá todos los campos'); return; }
    const { data, error } = await sb.auth.signUp({ email, password: pass });
    if (error) { showAuthError(error.message); return; }
    const { data: taller } = await sb.from('talleres').insert({ nombre: tallerNombre, telefono: tallerTel }).select().single();
    await sb.from('perfiles').insert({ id: data.user.id, nombre, rol: 'admin', taller_id: taller.id });
    toast('Taller creado. ¡Bienvenido!', 'success');

  } else if (loginTab === 'register') {
    // Bloquear si no viene de link de invitación
    if (!tallerIdFromUrl) { showAuthError('Necesitás un link de invitación del taller'); return; }
    const nombre = document.getElementById('reg-nombre').value.trim();
    const codigo = document.getElementById('reg-codigo').value.trim();
    if (!nombre) { showAuthError('Tu nombre es obligatorio'); return; }

    // Verificar código si fue ingresado
    let tallerIdFinal = tallerIdFromUrl; // Usar el taller del link si existe
    let rolFinal = 'cliente';

    if (codigo) {
      const { data: cod } = await sb.from('codigos_empleado').select('*').eq('codigo', codigo).eq('usado', false).single();
      if (!cod) { showAuthError('Código inválido o ya utilizado'); return; }
      tallerIdFinal = cod.taller_id;
      rolFinal = 'empleado';
    }

    const { data, error } = await sb.auth.signUp({ email, password: pass });
    if (error) { showAuthError(error.message); return; }

    await sb.from('perfiles').insert({ id: data.user.id, nombre, rol: rolFinal, taller_id: tallerIdFinal });

    // Marcar código como usado
    if (codigo && tallerIdFinal && rolFinal === 'empleado') {
      await sb.from('codigos_empleado').update({ usado: true, usado_por: data.user.id }).eq('codigo', codigo);
    }
    toast(rolFinal === 'empleado' ? 'Registrado como empleado' : 'Cuenta creada como cliente', 'success');
  }
}

async function handleForgotPassword() {
  const email = document.getElementById('auth-email').value.trim();
  if (!email) { showAuthError('Ingresá tu email'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.href
  });
  if (error) { showAuthError('Error al enviar el email'); return; }
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('login-form').innerHTML = `
    <div style="text-align:center;padding:1rem">
      <div style="font-size:2rem;margin-bottom:1rem">📧</div>
      <div style="font-family:var(--font-head);font-size:1.2rem;color:var(--accent);margin-bottom:.5rem">EMAIL ENVIADO</div>
      <p style="color:var(--text2);font-size:.85rem">Revisá tu bandeja de entrada y seguí el link para restablecer tu contraseña.</p>
      <button class="btn-secondary" style="margin-top:1.5rem" onclick="location.reload()">VOLVER AL LOGIN</button>
    </div>`;
}

async function cambiarContrasena() {
  const pass1 = document.getElementById('new-pass').value;
  const pass2 = document.getElementById('new-pass2').value;
  const errEl = document.getElementById('auth-error');

  if (!pass1 || pass1.length < 6) { 
    errEl.textContent = 'La contraseña debe tener al menos 6 caracteres';
    errEl.style.display = 'block';
    return; 
  }
  if (pass1 !== pass2) { 
    errEl.textContent = 'Las contraseñas no coinciden';
    errEl.style.display = 'block';
    return; 
  }

  const btn = document.querySelector('#login-form .btn-primary');
  if (btn) btn.textContent = 'GUARDANDO...';
  errEl.style.display = 'none';

  const { error } = await sb.auth.updateUser({ password: pass1 });
  
  if (error) { 
    errEl.textContent = 'Error: ' + error.message;
    errEl.style.display = 'block';
    if (btn) btn.textContent = 'GUARDAR CONTRASEÑA';
    return; 
  }

  recoveryMode = false;
  await sb.auth.signOut();
  window.location.href = window.location.origin + window.location.pathname;
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

async function logout() {
  currentUser = null;
  currentPerfil = null;
  await sb.auth.signOut();
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  location.reload();
}

  overlay.className = 'modal-overlay';

function previewFoto(input, hiddenId, previewId) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById(previewId).innerHTML = `<img src="${e.target.result}" style="width:100%;max-height:150px;object-fit:cover;border-radius:8px;border:1px solid var(--border)">`;
    document.getElementById(hiddenId).value = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function descontarStock(id, stockActual) {
  const descuento = parseFloat(document.getElementById('f-descuento').value)||0;

  if (descuento>stockActual) { toast('No hay suficiente stock','error'); return; }
  const { error } = await sb.from('inventario').update({ cantidad: stockActual - descuento }).eq('id',id);
  if (error) { toast('Error','error'); return; }
  toast('Stock actualizado','success'); closeModal(); inventario();
}

    </div>

                  <div style="font-weight:500;font-size:.9rem">${t.tipo_trabajo||'Trabajo general'}</div>
                  <div style="font-size:.75rem;color:var(--text2);margin-top:2px">${t.vehiculos?t.vehiculos.patente+' · '+t.vehiculos.marca+' '+(t.vehiculos.modelo||''):'Sin vehículo'}</div>
                  ${t.comentario?`<div style="font-size:.8rem;color:var(--text2);margin-top:.4rem;font-style:italic">"${t.comentario}"</div>`:''}
                  ${t.foto_vehiculo_url?`<img src="${t.foto_vehiculo_url}" style="width:100%;max-height:160px;object-fit:cover;border-radius:8px;margin-top:.5rem;border:1px solid var(--border)">`:''}

// ─── FACTURACIÓN ─────────────────────────────────────────────────────────────
async function facturacion() {
  const { data } = await sb.from('facturas').select('*, clientes(nombre), reparaciones(descripcion)').eq('taller_id',tid()).order('created_at',{ascending:false});

  document.getElementById('main-content').innerHTML = `
    <div class="section-header">
      <div class="section-title">Facturas</div>
    </div>
    ${(data||[]).length===0 ? `<div class="empty"><p>Sin facturas generadas</p></div>` :
      (data||[]).map(f => `
      <div class="card" onclick="detalleFactura('${f.id}')">
        <div class="card-header">
          <div class="card-avatar">🧾</div>
          <div class="card-info">
            <div class="card-name">${f.clientes?f.clientes.nombre:'Sin cliente'}</div>
            <div class="card-sub">${f.fecha||''} · ${f.pagada?'PAGADA':'PENDIENTE'}</div>
          </div>
          <div style="text-align:right">
            <div style="font-family:var(--font-head);color:var(--accent)">₲${gs(f.total)}</div>
            <span class="card-badge ${f.pagada?'badge-green':'badge-yellow'}">${f.pagada?'PAGADA':'PENDIENTE'}</span>
          </div>
        </div>
      </div>`).join('')}`;
}

async function modalNuevaFactura(reparacionId) {
  closeModal();
  const { data:r } = await sb.from('reparaciones').select('*, clientes(nombre,telefono), vehiculos(patente,marca)').eq('id',reparacionId).single();
  if (!r) return;

  openModal(`
    <div class="modal-title">NUEVA FACTURA</div>
    <div style="background:var(--surface2);border-radius:8px;padding:.75rem;margin-bottom:1rem">
      <div style="font-size:.8rem;color:var(--text2)">Reparación</div>
      <div style="font-weight:500">${r.descripcion}</div>
      <div style="font-size:.75rem;color:var(--text2)">${r.clientes?r.clientes.nombre:''} · ${r.vehiculos?r.vehiculos.patente:''}</div>
    </div>
    <div class="form-group"><label class="form-label">Fecha</label><input class="form-input" id="f-fecha" type="date" value="${new Date().toISOString().split('T')[0]}"></div>
    <div class="form-group"><label class="form-label">Mano de obra (₲)</label><input class="form-input" id="f-mano" type="number" value="${r.costo||0}" oninput="calcTotal()"></div>
    <div class="form-group"><label class="form-label">Repuestos (₲)</label><input class="form-input" id="f-repuestos" type="number" value="0" oninput="calcTotal()"></div>
    <div class="form-group"><label class="form-label">Otros (₲)</label><input class="form-input" id="f-otros" type="number" value="0" oninput="calcTotal()"></div>
    <div style="background:var(--surface2);border-radius:8px;padding:.75rem;margin-bottom:1rem">
      <div class="factura-item"><span>Mano de obra</span><span id="t-mano">₲${gs(r.costo)}</span></div>
      <div class="factura-item"><span>Repuestos</span><span id="t-rep">₲0</span></div>
      <div class="factura-item"><span>Otros</span><span id="t-otros">₲0</span></div>
      <div class="factura-total"><span>TOTAL</span><span id="t-total">₲${gs(r.costo)}</span></div>
    </div>
    <div class="form-group"><label class="form-label">Notas</label><textarea class="form-input" id="f-notas" rows="2" placeholder="Observaciones..."></textarea></div>
    <button class="btn-primary" onclick="guardarFactura('${reparacionId}','${r.cliente_id||''}')">GUARDAR FACTURA</button>
    <button class="btn-secondary" onclick="closeModal()">CANCELAR</button>`);
}

function calcTotal() {
  const mano = parseFloat(document.getElementById('f-mano').value)||0;
  const rep = parseFloat(document.getElementById('f-repuestos').value)||0;
  const otros = parseFloat(document.getElementById('f-otros').value)||0;
  const total = mano+rep+otros;
  document.getElementById('t-mano').textContent = '₲'+gs(mano);
  document.getElementById('t-rep').textContent = '₲'+gs(rep);
  document.getElementById('t-otros').textContent = '₲'+gs(otros);
  document.getElementById('t-total').textContent = '₲'+gs(total);
}

async function guardarFactura(reparacionId, clienteId) {
  const mano = parseFloat(document.getElementById('f-mano').value)||0;
  const rep = parseFloat(document.getElementById('f-repuestos').value)||0;
  const otros = parseFloat(document.getElementById('f-otros').value)||0;
  const total = mano+rep+otros;
  const data = { reparacion_id:reparacionId, cliente_id:clienteId||null, fecha:document.getElementById('f-fecha').value, mano_obra:mano, repuestos:rep, otros, total, notas:document.getElementById('f-notas').value, pagada:false, taller_id:tid() };
  const { error } = await sb.from('facturas').insert(data);
  if (error) { toast('Error: '+error.message,'error'); return; }
  toast('Factura guardada','success'); closeModal(); facturacion();
}

async function detalleFactura(id) {
  const { data:f } = await sb.from('facturas').select('*, clientes(nombre,telefono), reparaciones(descripcion,vehiculos(patente,marca))').eq('id',id).single();
  if (!f) return;

  document.getElementById('main-content').innerHTML = `
    <div class="detail-header">
      <button class="back-btn" onclick="navigate('facturacion')">← Volver</button>
      <div class="detail-avatar">🧾</div>
      <div><div class="detail-name">Factura</div><div class="detail-sub">${f.fecha||''}</div></div>
    </div>
    <div style="background:var(--surface2);border-radius:12px;padding:1rem;margin-bottom:1rem;border:1px solid var(--border)">
      <div style="font-family:var(--font-head);font-size:1rem;color:var(--text2);margin-bottom:.75rem;letter-spacing:1px">DETALLE</div>
      <div class="factura-item"><span style="color:var(--text2)">Cliente</span><span>${f.clientes?f.clientes.nombre:'-'}</span></div>
      <div class="factura-item"><span style="color:var(--text2)">Vehículo</span><span>${f.reparaciones?.vehiculos?f.reparaciones.vehiculos.patente:'-'}</span></div>
      <div class="factura-item"><span style="color:var(--text2)">Reparación</span><span>${f.reparaciones?f.reparaciones.descripcion:'-'}</span></div>
      <div style="height:1px;background:var(--border);margin:.5rem 0"></div>
      <div class="factura-item"><span>Mano de obra</span><span>₲${gs(f.mano_obra)}</span></div>
      <div class="factura-item"><span>Repuestos</span><span>₲${gs(f.repuestos)}</span></div>
      <div class="factura-item"><span>Otros</span><span>₲${gs(f.otros)}</span></div>
      <div class="factura-total"><span>TOTAL</span><span>₲${gs(f.total)}</span></div>
    </div>
    ${f.notas?`<div class="info-item" style="margin-bottom:1rem"><div class="label">Notas</div><div class="value">${f.notas}</div></div>`:''}
    ${!f.pagada?`<button class="btn-primary" onclick="marcarFacturaPagada('${id}')">✓ MARCAR COMO PAGADA</button>`:`<div style="text-align:center;color:var(--success);font-family:var(--font-head);font-size:1.1rem;padding:1rem">✓ FACTURA PAGADA</div>`}`;
}

async function marcarFacturaPagada(id) {
  await sb.from('facturas').update({ pagada:true }).eq('id',id);
  toast('Factura marcada como pagada','success'); detalleFactura(id);
}

// ─── USUARIOS (ADMIN) ─────────────────────────────────────────────────────────
async function usuarios() {
  const [{ data: perfiles }, { data: codigos }] = await Promise.all([
    sb.from('perfiles').select('*').eq('taller_id', tid()).order('nombre'),
    sb.from('codigos_empleado').select('*').eq('taller_id', tid()).eq('usado', false).order('created_at', {ascending:false})
  ]);

  document.getElementById('main-content').innerHTML = `
    <div class="section-header">
      <div class="section-title">Usuarios</div>
      <button class="btn-add" onclick="modalInvitarUsuario()">+ Invitar</button>
    </div>

    ${(codigos||[]).length > 0 ? `
    <div style="background:rgba(255,204,0,.05);border:1px solid rgba(255,204,0,.2);border-radius:10px;padding:.75rem;margin-bottom:1rem">
      <div style="font-size:.75rem;color:var(--warning);font-family:var(--font-head);letter-spacing:1px;margin-bottom:.5rem">CÓDIGOS PENDIENTES</div>
      ${(codigos||[]).map(c => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--border)">
          <span style="font-family:var(--font-head);font-size:1.1rem;color:var(--accent);letter-spacing:3px">${c.codigo}</span>
          <button onclick="eliminarCodigo('${c.id}')" style="font-size:.7rem;background:none;border:1px solid var(--border);color:var(--danger);border-radius:6px;padding:2px 8px;cursor:pointer">✕ Cancelar</button>
        </div>`).join('')}
    </div>` : ''}

    <div style="font-size:.75rem;color:var(--text2);font-family:var(--font-head);letter-spacing:1px;margin-bottom:.5rem">MIEMBROS DEL TALLER</div>
    ${(perfiles||[]).map(u => `
    <div class="card">
      <div class="card-header">
        <div class="card-avatar">${u.nombre?u.nombre.charAt(0).toUpperCase():'?'}</div>
        <div class="card-info">
          <div class="card-name">${u.nombre||'Sin nombre'}${u.id===currentUser.id?' (Vos)':''}</div>
        </div>
        <span class="card-badge ${u.rol==='admin'?'role-admin':u.rol==='empleado'?'role-empleado':'role-cliente'}" style="border:none">${u.rol.toUpperCase()}</span>
        ${u.id!==currentUser.id?`<button onclick="cambiarRol('${u.id}','${u.rol}')" style="font-size:.7rem;background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:3px 8px;cursor:pointer;margin-left:.5rem">Rol</button>`:''}
      </div>
    </div>`).join('')}

    <div style="font-size:.75rem;color:var(--text2);font-family:var(--font-head);letter-spacing:1px;margin:1rem 0 .5rem">VINCULAR CLIENTE</div>
    <div style="background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.2);border-radius:10px;padding:.75rem;font-size:.8rem;color:var(--text2);margin-bottom:.5rem">
      Si un cliente ya se registró, vinculalo a su ficha para que vea sus vehículos y reparaciones.
    </div>
    <button class="btn-secondary" onclick="modalVincularCliente()">Vincular cliente existente</button>`;
}

async function eliminarCodigo(id) {
  await sb.from('codigos_empleado').delete().eq('id', id);
  toast('Código cancelado'); usuarios();
}

async function cambiarRol(userId, rolActual) {
  const roles = ['admin','empleado','cliente'];
  const siguiente = roles[(roles.indexOf(rolActual)+1) % roles.length];
  if (!confirm(`¿Cambiar rol a ${siguiente.toUpperCase()}?`)) return;
  await sb.from('perfiles').update({ rol: siguiente }).eq('id', userId);
  toast('Rol actualizado','success'); usuarios();
}

async function modalVincularCliente() {
  const [{ data: cls }, { data: perfs }] = await Promise.all([
    sb.from('clientes').select('id,nombre').eq('taller_id', tid()).order('nombre'),
    sb.from('perfiles').select('id,nombre').eq('taller_id', tid()).eq('rol','cliente').order('nombre')
  ]);
  openModal(`
    <div class="modal-title">VINCULAR CLIENTE</div>
    <p style="color:var(--text2);font-size:.82rem;margin-bottom:1rem">Seleccioná el usuario registrado y la ficha de cliente que le corresponde.</p>
    <div class="form-group"><label class="form-label">Usuario (cuenta registrada)</label>
      <select class="form-input" id="f-perfil-id">
        <option value="">Seleccionar usuario</option>
        ${(perfs||[]).map(p => `<option value="${p.id}">${p.nombre}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label class="form-label">Ficha de cliente</label>
      <select class="form-input" id="f-cliente-id">
        <option value="">Seleccionar cliente</option>
        ${(cls||[]).map(c => `<option value="${c.id}">${c.nombre}</option>`).join('')}
      </select>
    </div>
    <button class="btn-primary" onclick="vincularCliente()">VINCULAR</button>
    <button class="btn-secondary" onclick="closeModal()">CANCELAR</button>`);
}

async function vincularCliente() {
  const perfilId = document.getElementById('f-perfil-id').value;
  const clienteId = document.getElementById('f-cliente-id').value;
  if (!perfilId || !clienteId) { toast('Seleccioná ambos campos','error'); return; }
  // Guardar cliente_id en el perfil
  const { error } = await sb.from('perfiles').update({ cliente_id: clienteId }).eq('id', perfilId);
  if (error) { toast('Error: '+error.message,'error'); return; }
  toast('Cliente vinculado correctamente','success');
  closeModal(); usuarios();
}

function modalInvitarUsuario() {
  const base = window.location.origin + window.location.pathname;
  const linkCliente = `${base}?taller=${tid()}`;
  openModal(`
    <div class="modal-title">INVITAR USUARIO</div>
    <div class="tabs" style="margin-bottom:1rem">
      <button class="tab active" onclick="switchInviteTab('empleado',this)">Empleado</button>
      <button class="tab" onclick="switchInviteTab('cliente',this)">Cliente</button>
    </div>
    <div id="invite-empleado">
      <p style="color:var(--text2);font-size:.85rem;margin-bottom:1rem">Generá un código único de un solo uso para tu empleado.</p>
      <button class="btn-primary" onclick="generarCodigoEmpleado()">GENERAR CÓDIGO</button>
      <div id="codigo-generado" style="display:none;margin-top:1rem;background:var(--surface2);border:1px solid var(--accent);border-radius:10px;padding:1rem;text-align:center">
        <div style="font-size:.75rem;color:var(--text2);margin-bottom:.5rem">CÓDIGO DE EMPLEADO</div>
        <div id="codigo-valor" style="font-family:var(--font-head);font-size:2rem;font-weight:700;color:var(--accent);letter-spacing:4px"></div>
        <button onclick="copiarCodigo()" style="margin-top:.75rem;background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:.4rem 1rem;cursor:pointer;font-size:.8rem">📋 Copiar código</button>
        <div style="font-size:.72rem;color:var(--text2);margin-top:.5rem">Válido para un solo uso</div>
      </div>
    </div>
    <div id="invite-cliente" style="display:none">
      <p style="color:var(--text2);font-size:.85rem;margin-bottom:.75rem">Compartí este link con tu cliente. Al registrarse queda automáticamente asignado a tu taller.</p>
      <div style="background:var(--surface2);border-radius:8px;padding:.75rem;font-size:.78rem;color:var(--accent);word-break:break-all;margin-bottom:.75rem">${linkCliente}</div>
      <button class="btn-primary" onclick="navigator.clipboard.writeText('${linkCliente}').then(()=>toast('Link copiado','success'))">📋 COPIAR LINK</button>
      <p style="font-size:.72rem;color:var(--text2);margin-top:.75rem;text-align:center">Después de que se registre, vinculalo a su ficha desde esta pantalla.</p>
    </div>
    <button class="btn-secondary" onclick="closeModal()">CERRAR</button>`);
}

function switchInviteTab(tipo, btn) {
  document.querySelectorAll('#modal-overlay .tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('invite-empleado').style.display = tipo==='empleado' ? 'block' : 'none';
  document.getElementById('invite-cliente').style.display = tipo==='cliente' ? 'block' : 'none';
}

async function generarCodigoEmpleado() {
  const codigo = Math.random().toString(36).substring(2,8).toUpperCase();
  const { error } = await sb.from('codigos_empleado').insert({ codigo, taller_id: tid(), usado: false });
  if (error) { toast('Error al generar código','error'); return; }
  document.getElementById('codigo-generado').style.display = 'block';
  document.getElementById('codigo-valor').textContent = codigo;
}

function copiarCodigo() {
  const codigo = document.getElementById('codigo-valor').textContent;
  navigator.clipboard.writeText(codigo).then(() => toast('Código copiado','success'));
}

// ─── VISTA CLIENTE ────────────────────────────────────────────────────────────
async function misVehiculos() {
  // Buscar cliente_id desde el perfil
  const { data: perfil } = await sb.from('perfiles').select('cliente_id').eq('id', currentUser.id).maybeSingle();

  if (!perfil?.cliente_id) {
    document.getElementById('main-content').innerHTML = `
      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>
        <p style="font-size:1rem;margin-bottom:.5rem">Cuenta pendiente de vinculación</p>
        <p style="font-size:.8rem">El taller todavía no vinculó tu cuenta a tu ficha de cliente. Avisales para que lo hagan.</p>
      </div>`;
    return;
  }

  const { data } = await sb.from('vehiculos').select('*').eq('cliente_id', perfil.cliente_id);
  document.getElementById('main-content').innerHTML = `
    <div class="section-header"><div class="section-title">Mis Autos</div></div>
    ${(data||[]).length===0 ? `<div class="empty"><p>Sin vehículos registrados</p></div>` :
      (data||[]).map(v => `
      <div class="card">
        <div class="card-header">
          ${v.foto_url?`<img src="${v.foto_url}" style="width:44px;height:44px;object-fit:cover;border-radius:8px">`:`<div class="card-avatar" style="font-size:.8rem">${v.patente}</div>`}
          <div class="card-info"><div class="card-name">${v.marca} ${v.modelo||''}</div><div class="card-sub">${v.patente} · ${v.anio||''}</div></div>
        </div>
      </div>`).join('')}`;
}

async function misReparaciones() {
  if (currentPerfil?.rol !== 'cliente') { dashboard(); return; }

  const { data: perfil } = await sb.from('perfiles').select('cliente_id').eq('id', currentUser.id).maybeSingle();

  if (!perfil?.cliente_id) {
    document.getElementById('main-content').innerHTML = `
      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>
        <p style="font-size:1rem;margin-bottom:.5rem">Cuenta pendiente de vinculación</p>
        <p style="font-size:.8rem">El taller todavía no vinculó tu cuenta. Avisales para que lo hagan.</p>
      </div>`;
    return;
  }

  const { data } = await sb.from('reparaciones').select('*, vehiculos(patente,marca)').eq('cliente_id', perfil.cliente_id).order('created_at',{ascending:false});
  document.getElementById('main-content').innerHTML = `
    <div class="section-header"><div class="section-title">Mis Reparaciones</div></div>
    ${(data||[]).length===0 ? `<div class="empty"><p>Sin reparaciones registradas</p></div>` :
      (data||[]).map(r => `
      <div class="card">
        <div class="card-header">
          <div class="card-avatar">🔧</div>
          <div class="card-info">
            <div class="card-name">${r.descripcion}</div>
            <div class="card-sub">${r.vehiculos?r.vehiculos.patente+' · '+r.vehiculos.marca:''} · ${r.fecha||''}</div>
          </div>
          <span class="card-badge ${estadoBadge(r.estado)}">${estadoLabel(r.estado)}</span>
        </div>
      </div>`).join('')}`;
}
</script>
</body>
</html>
